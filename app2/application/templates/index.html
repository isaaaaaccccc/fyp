{% extends "layout.html" %}

{% block content %}
    <!-- Loader while data’s fetching -->
    <div id="loader" class="text-center my-5">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading…</span>
        </div>
        <p>Building your dashboard…</p>
    </div>

    <!-- Day filter -->
    <div id="day-filter-container" class="mb-4" style="display: none;">
        <div class="d-flex align-items-center">
            <label for="day-filter" class="me-2 mb-0">Filter by Day:</label>
            <select id="day-filter" class="form-select w-auto">
                <option value="All">All</option>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
        </div>
    </div>

    <!-- Summary cards -->
    <div id="summary-cards" class="row mb-4" style="display: none;"></div>

    <!-- Additional Analytics -->
    <div id="analytics-section" class="mb-5" style="display: none;">
        <h3>Additional Analytics</h3>
        <div class="row mb-4">
            <div class="col-12 col-md-6">
                <h5>Total Sessions per Branch</h5>
                <canvas id="sessions-per-branch"></canvas>
            </div>
            <div class="col-12 col-md-6">
                <h5>Coach Workload Distribution</h5>
                <canvas id="coach-workload"></canvas>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-12 col-md-6">
                <h5>Class Type Distribution</h5>
                <canvas id="class-type-distribution"></canvas>
            </div>
            <div class="col-12 col-md-6">
                <h5>Earliest &amp; Latest Start Times</h5>
                <div id="time-summary-cards" class="d-flex flex-wrap gap-3"></div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div id="dashboard-container" class="d-flex flex-wrap" style="display: none;"></div>

    <!-- Timetable -->
    <div id="timetable-section" class="mt-5" style="display: none;">
        <h3>Branch Timetable</h3>
        <div class="mb-3">
            <label for="tt-branch-select" class="form-label">Select Branch:</label>
            <select id="tt-branch-select" class="form-select w-auto"></select>
        </div>
        <div id="timetable-container"></div>
    </div>
{% endblock %}

{% block scripts %}
    {{ super() }}
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Dashboard logic -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
